<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── iOS Design Tokens ──────────────────────────────────────────── */
:root{
  /* System backgrounds */
  --sys-bg:          #000000;
  --sys-bg2:         #1c1c1e;
  --sys-bg3:         #2c2c2e;
  --sys-bg4:         #3a3a3c;

  /* Fills */
  --fill-thick:      rgba(118,118,128,.36);
  --fill-med:        rgba(118,118,128,.28);
  --fill-thin:       rgba(118,118,128,.20);
  --fill-ultra:      rgba(118,118,128,.12);

  /* Labels */
  --lbl:             rgba(255,255,255,1);
  --lbl2:            rgba(235,235,245,.6);
  --lbl3:            rgba(235,235,245,.3);
  --lbl4:            rgba(235,235,245,.16);

  /* iOS system colors */
  --ios-green:       #30d158;
  --ios-blue:        #0a84ff;
  --ios-red:         #ff453a;
  --ios-orange:      #ff9f0a;
  --ios-yellow:      #ffd60a;
  --ios-purple:      #bf5af2;
  --ios-teal:        #40c8e0;

  /* tap+ brand */
  --brand:           #00e5a0;

  /* Separators */
  --sep:             rgba(84,84,88,.6);

  /* Radius */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;

  /* Compat */
  --green:  var(--brand);
  --teal:   var(--brand);
  --black:  #000;
  --card:   var(--sys-bg2);
  --border: var(--sep);
  --white:  rgba(255,255,255,1);
  --gray:   rgba(235,235,245,.6);
  --red:    var(--ios-red);
  --radius: var(--r-md);
  --radius-sm: var(--r-sm);
  --bg2:    var(--sys-bg2);
  --bg3:    var(--sys-bg3);
  --label:  var(--lbl);
  --label2: var(--lbl2);
  --label3: var(--lbl3);
  --fill3:  var(--fill-thin);
  --fill4:  var(--fill-ultra);
}

html,body{
  height:100%;
  background:var(--sys-bg);
  color:var(--lbl);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',sans-serif;
  font-size:16px;
  line-height:1.5;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh}
*{scrollbar-width:none}
::-webkit-scrollbar{display:none}

/* ── Splash / Loading ───────────────────────────────────────────── */
#loading{
  position:fixed;inset:0;background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .6s;
}
#loading.hidden{opacity:0;pointer-events:none}

.ripple-wrap{
  position:relative;
  width:260px;height:260px;
  display:flex;align-items:center;justify-content:center;
}

.ripple{
  position:absolute;
  border-radius:50%;
  border:1.5px solid var(--brand);
  opacity:0;
  animation:ripple 4.5s cubic-bezier(.2,.6,.4,1) infinite;
}
.r1{ width:120px;height:120px; animation-delay:0s; }
.r2{ width:180px;height:180px; animation-delay:1.1s; }
.r3{ width:240px;height:240px; animation-delay:2.2s; }

@keyframes ripple{
  0%  { transform:scale(.4); opacity:.6; }
  100%{ transform:scale(1);  opacity:0;  }
}

.load-logo-wrap{
  position:relative;z-index:2;
  text-align:center;
}
.load-logo{
  font-size:52px;font-weight:700;letter-spacing:-.05em;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  line-height:1;
  color:#fff;
}
.load-logo span{color:var(--brand)}

@media(prefers-reduced-motion:reduce){
  .ripple{animation:none;opacity:0}
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Pages ──────────────────────────────────────────────────────── */
.page{max-width:480px;margin:0 auto;padding:16px 16px 96px}
.page-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:32px 24px;
  max-width:480px;margin:0 auto;
}

/* ── iOS Cards ──────────────────────────────────────────────────── */
.card{
  background:var(--sys-bg2);border-radius:var(--r-lg);
  padding:16px;margin-bottom:8px;border:none;
}
.plain-card{
  background:var(--sys-bg2);border-radius:var(--r-lg);
  padding:14px 16px;margin-bottom:8px;border:none;
}

/* iOS grouped list */
.ios-group{
  background:var(--sys-bg2);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:20px;
}
.ios-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:.5px solid var(--sep);
  min-height:44px;cursor:pointer;
  transition:background .1s;
}
.ios-row:active{background:var(--fill-ultra)}
.ios-row:last-child{border-bottom:none}

/* ── Buttons ────────────────────────────────────────────────────── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--r-lg);
  padding:14px 20px;font-size:16px;font-weight:600;
  cursor:pointer;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  transition:opacity .15s,transform .1s;
  text-decoration:none;white-space:nowrap;
  letter-spacing:-.01em;
}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-primary{background:var(--brand);color:#000;font-weight:700}
.btn-ghost{background:var(--fill-thin);color:var(--lbl);border:none}
.btn-danger{background:rgba(255,69,58,.15);color:var(--ios-red);border:none}
.btn-full{width:100%}
.btn-sm{padding:8px 14px;font-size:14px;border-radius:var(--r-sm)}

/* ── Inputs ─────────────────────────────────────────────────────── */
.inp{
  width:100%;background:var(--fill-ultra);border:none;
  border-radius:var(--r-sm);padding:12px 14px;
  color:var(--lbl);font-size:16px;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  outline:none;transition:background .2s;-webkit-appearance:none;
}
.inp:focus{background:var(--fill-thin)}
.inp::placeholder{color:var(--lbl3)}
.sel{
  width:100%;background:var(--fill-ultra);border:none;
  border-radius:var(--r-sm);padding:12px 14px;
  color:var(--lbl);font-size:16px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  outline:none;cursor:pointer;-webkit-appearance:none;
}
.field-lbl{
  font-size:12px;font-weight:500;letter-spacing:.01em;
  color:var(--lbl2);margin-bottom:6px;padding-left:2px;
  text-transform:uppercase;font-size:11px;letter-spacing:.06em;
}

/* ── Segmented control (tabs) ───────────────────────────────────── */
.tabs{
  display:flex;gap:2px;background:var(--fill-ultra);
  border-radius:var(--r-sm);padding:2px;
  margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.tab{
  flex:0 0 auto;padding:7px 12px;border-radius:7px;
  font-size:13px;font-weight:500;cursor:pointer;
  color:var(--lbl3);white-space:nowrap;
  border:none;background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  transition:all .2s;letter-spacing:-.01em;
}
.tab.active{
  background:var(--sys-bg3);color:var(--lbl);
  box-shadow:0 1px 3px rgba(0,0,0,.4),0 .5px 1px rgba(0,0,0,.3);
}

/* ── Tab bar ────────────────────────────────────────────────────── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(28,28,30,.85);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border-top:.5px solid rgba(255,255,255,.12);
  display:flex;align-items:stretch;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;padding:8px 4px 2px;
  cursor:pointer;color:var(--lbl3);
  font-size:10px;font-weight:400;letter-spacing:0;
  transition:color .15s;font-family:-apple-system,sans-serif;
}
.nav-item.active{color:var(--brand)}
.nav-icon{font-size:24px;line-height:1}

/* ── Toast ──────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:96px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(44,44,46,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:100px;padding:10px 18px;
  font-size:14px;font-weight:500;
  opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:999;white-space:nowrap;
  color:var(--lbl);box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Bottom sheet ───────────────────────────────────────────────── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;display:none;align-items:flex-end;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#modal-overlay.open{display:flex}
#modal-box{
  background:var(--sys-bg2);
  border-radius:20px 20px 0 0;
  padding:0 0 max(28px,env(safe-area-inset-bottom));
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  animation:sheetUp .35s cubic-bezier(.32,1,.23,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal-box::before{
  content:'';display:block;
  width:36px;height:4px;background:var(--fill-med);
  border-radius:2px;margin:10px auto 0;
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;
}
.modal-title{font-size:17px;font-weight:600;letter-spacing:-.02em}
.modal-close{
  background:var(--fill-thin);border:none;border-radius:50%;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;color:var(--lbl2);font-weight:500;
}
/* Modal content padding */
#modal-box > div:not(.modal-head){padding:0 20px 8px}

/* ── Spinner ────────────────────────────────────────────────────── */
.spinner{
  width:28px;height:28px;
  border:2px solid rgba(255,255,255,.1);border-top-color:var(--brand);
  border-radius:50%;animation:spin .8s linear infinite;
}

/* ── PIN pad (iOS calculator style) ────────────────────────────── */
.pin-display{display:flex;gap:16px;justify-content:center;margin:20px 0}
.pin-dot{
  width:13px;height:13px;border-radius:50%;
  border:1.5px solid var(--fill-thick);transition:all .12s;
}
.pin-dot.filled{background:var(--lbl);border-color:var(--lbl)}
.pin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;max-width:280px;margin:4px auto;padding:0 16px;
}
.pin-key{
  background:var(--sys-bg3);border:none;
  border-radius:50%;width:68px;height:68px;
  margin:0 auto;font-size:22px;font-weight:400;
  cursor:pointer;transition:all .1s;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--lbl);display:flex;align-items:center;justify-content:center;
}
.pin-key:active{background:var(--sys-bg4);transform:scale(.92)}
.pin-key.del{font-size:17px;color:var(--lbl2)}

/* ── Stats ──────────────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{
  background:var(--sys-bg2);border-radius:var(--r-lg);
  padding:16px 12px;text-align:center;
}
.stat-val{
  font-size:30px;font-weight:700;color:var(--brand);
  line-height:1;letter-spacing:-.03em;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.stat-lbl{
  font-size:11px;color:var(--lbl3);margin-top:5px;
  font-weight:400;letter-spacing:.02em;
}

/* ── iOS Toggle ─────────────────────────────────────────────────── */
.toggle{
  width:51px;height:31px;border-radius:16px;
  background:var(--fill-med);position:relative;
  cursor:pointer;transition:background .28s;flex-shrink:0;
}
.toggle.on{background:var(--brand)}
.toggle-thumb{
  position:absolute;top:2px;left:2px;
  width:27px;height:27px;border-radius:50%;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.3),0 .5px 1px rgba(0,0,0,.15);
  transition:left .28s cubic-bezier(.4,0,.2,1);
}
.toggle.on .toggle-thumb{left:22px}

/* ── Leaderboard ────────────────────────────────────────────────── */
.lb-row{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:.5px solid var(--sep);
}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:17px;font-weight:600;width:26px;text-align:center}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-sub{font-size:13px;color:var(--lbl3);margin-top:1px}
.lb-score{font-size:17px;font-weight:600;color:var(--brand)}

/* ── Goals ──────────────────────────────────────────────────────── */
.goal-row{
  background:var(--sys-bg2);border-radius:var(--r-lg);
  padding:14px 16px;margin-bottom:8px;
}
.goal-bar-bg{height:4px;background:var(--fill-ultra);border-radius:2px;margin-top:10px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:2px;background:var(--brand);transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* ── Feedback ───────────────────────────────────────────────────── */
.fb-item{background:var(--sys-bg2);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px}
.fb-stars{color:var(--ios-yellow);font-size:13px;margin-bottom:5px}
.fb-text{font-size:15px;line-height:1.5;letter-spacing:-.01em}
.fb-meta{font-size:12px;color:var(--lbl3);margin-top:6px}

/* ── AI card ────────────────────────────────────────────────────── */
.ai-card{
  background:rgba(191,90,242,.08);
  border:1px solid rgba(191,90,242,.2);
  border-radius:var(--r-lg);padding:16px;
}
.ai-text{font-size:15px;line-height:1.65;color:rgba(255,255,255,.82);letter-spacing:-.01em}

/* ── Tap page ───────────────────────────────────────────────────── */
.tap-page{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:32px 24px 60px;max-width:420px;margin:0 auto;position:relative;
}

/* ── Section label ──────────────────────────────────────────────── */
.sec-lbl{
  font-size:12px;font-weight:500;color:var(--lbl2);
  margin-bottom:10px;padding-left:2px;
  letter-spacing:.04em;text-transform:uppercase;
}

/* ── Animations ─────────────────────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{
  0%{transform:scale(.8)}60%{transform:scale(1.15)}100%{transform:scale(1)}
}
.fade-up{animation:fadeUp .32s cubic-bezier(.34,1.1,.64,1)}
</style>
