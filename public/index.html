<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── Core tokens ─────────────────────────────────────────── */
:root{
  /* Backgrounds */
  --bg:      #000000;
  --bg2:     #0d0d0d;
  --bg3:     #1a1a1a;
  --bg4:     #242424;
  --bg5:     #2e2e2e;

  /* Brand */
  --brand:   #00e5a0;
  --brand2:  #00c48a;

  /* Accent colors (for stat tiles — fitness style) */
  --a-orange:  #ff6b35;
  --a-yellow:  #ffd60a;
  --a-purple:  #9b59ff;
  --a-blue:    #3b9eff;
  --a-red:     #ff4d6a;
  --a-teal:    #00e5a0;
  --a-pink:    #ff6eb4;

  /* Labels */
  --lbl:   rgba(255,255,255,1);
  --lbl2:  rgba(255,255,255,.65);
  --lbl3:  rgba(255,255,255,.35);
  --lbl4:  rgba(255,255,255,.15);

  /* Fills */
  --fill:      rgba(255,255,255,.06);
  --fill2:     rgba(255,255,255,.10);
  --fill3:     rgba(255,255,255,.15);
  --fill-ultra: rgba(255,255,255,.04);
  --fill-thin:  rgba(255,255,255,.08);
  --fill-med:   rgba(255,255,255,.12);

  /* Separator */
  --sep:   rgba(255,255,255,.08);

  /* Radius */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 24px;

  /* Compat aliases */
  --green:      var(--brand);
  --teal:       var(--brand);
  --black:      #000;
  --card:       var(--bg2);
  --border:     var(--sep);
  --white:      #fff;
  --gray:       rgba(255,255,255,.5);
  --red:        var(--a-red);
  --bg2:        #0d0d0d;
  --bg3:        #1a1a1a;
  --sys-bg:     #000;
  --sys-bg2:    #0d0d0d;
  --sys-bg3:    #1a1a1a;
  --sys-bg4:    #242424;
  --label:      rgba(255,255,255,1);
  --label2:     rgba(255,255,255,.65);
  --label3:     rgba(255,255,255,.35);
  --ios-yellow: #ffd60a;
  --ios-red:    #ff4d6a;
  --ios-orange: #ff6b35;
  --radius:     var(--r-md);
  --radius-sm:  var(--r-sm);
  --radius-lg:  var(--r-lg);
}

html,body{
  height:100%;background:var(--bg);color:var(--lbl);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:16px;line-height:1.5;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh}
*{scrollbar-width:none}::-webkit-scrollbar{display:none}

/* ── Loading / splash ─────────────────────────────────────── */
#loading{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
#loading.hidden{opacity:0;pointer-events:none}
.load-wordmark{
  font-size:52px;font-weight:800;letter-spacing:-.05em;
  font-variant-numeric:tabular-nums;
}
.load-wordmark span{color:var(--brand)}
.load-spinner{
  width:22px;height:22px;margin-top:28px;
  border:2px solid rgba(255,255,255,.12);
  border-top-color:var(--brand);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Layout ───────────────────────────────────────────────── */
.page{max-width:480px;margin:0 auto;padding:16px 16px 96px}
.page-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:32px 24px;
  max-width:480px;margin:0 auto;
}

/* ── Cards ────────────────────────────────────────────────── */
.card{background:var(--bg2);border-radius:var(--r-lg);padding:18px;margin-bottom:10px;border:none}
.plain-card{background:var(--bg2);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;border:none}

/* Colored stat tiles (fitness style) */
.stat-tile{
  border-radius:var(--r-lg);padding:18px 16px;
  position:relative;overflow:hidden;
}
.stat-tile-val{
  font-size:34px;font-weight:800;line-height:1;
  letter-spacing:-.04em;
  font-variant-numeric:tabular-nums;
}
.stat-tile-lbl{font-size:11px;font-weight:500;opacity:.75;margin-top:6px;letter-spacing:.04em;text-transform:uppercase}
.stat-tile-sub{font-size:12px;opacity:.6;margin-top:4px}

/* iOS grouped list */
.ios-group{background:var(--bg2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.ios-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-bottom:.5px solid var(--sep);
  min-height:48px;cursor:pointer;transition:background .1s;
}
.ios-row:active{background:var(--fill)}
.ios-row:last-child{border-bottom:none}

/* ── Buttons ──────────────────────────────────────────────── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:var(--r-lg);
  padding:15px 22px;font-size:16px;font-weight:600;
  cursor:pointer;font-family:'Inter',-apple-system,sans-serif;
  transition:opacity .15s,transform .1s;
  text-decoration:none;white-space:nowrap;letter-spacing:-.01em;
}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-primary{background:var(--brand);color:#000;font-weight:700}
.btn-ghost{background:var(--fill);color:var(--lbl);border:none}
.btn-danger{background:rgba(255,77,106,.12);color:var(--a-red);border:none}
.btn-full{width:100%}
.btn-sm{padding:9px 16px;font-size:14px;border-radius:var(--r-sm)}

/* ── Inputs ───────────────────────────────────────────────── */
.inp{
  width:100%;background:var(--fill);border:none;
  border-radius:var(--r-sm);padding:14px 16px;
  color:var(--lbl);font-size:16px;
  font-family:'Inter',-apple-system,sans-serif;
  outline:none;transition:background .2s;-webkit-appearance:none;
}
.inp:focus{background:var(--fill2)}
.inp::placeholder{color:var(--lbl3)}
.sel{
  width:100%;background:var(--fill);border:none;
  border-radius:var(--r-sm);padding:14px 16px;
  color:var(--lbl);font-size:16px;
  font-family:'Inter',-apple-system,sans-serif;
  outline:none;cursor:pointer;-webkit-appearance:none;
}
.field-lbl{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--lbl3);margin-bottom:8px;padding-left:2px;
}

/* ── Segmented tabs ───────────────────────────────────────── */
.tabs{
  display:flex;gap:2px;background:var(--fill-ultra);
  border-radius:var(--r-sm);padding:3px;
  margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.tab{
  flex:0 0 auto;padding:8px 14px;border-radius:8px;
  font-size:13px;font-weight:500;cursor:pointer;
  color:var(--lbl3);white-space:nowrap;border:none;
  background:transparent;font-family:'Inter',-apple-system,sans-serif;
  transition:all .2s;letter-spacing:-.01em;
}
.tab.active{
  background:var(--bg3);color:var(--lbl);
  box-shadow:0 1px 4px rgba(0,0,0,.5);
}

/* ── Tab bar ──────────────────────────────────────────────── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-top:.5px solid var(--sep);
  display:flex;align-items:stretch;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;padding:8px 4px 2px;cursor:pointer;
  color:var(--lbl3);font-size:10px;font-weight:500;
  transition:color .15s;font-family:'Inter',-apple-system,sans-serif;
  letter-spacing:.01em;
}
.nav-item.active{color:var(--brand)}
.nav-icon{font-size:22px;line-height:1}

/* ── Toast ────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:96px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(26,26,26,.96);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:100px;padding:10px 20px;
  font-size:14px;font-weight:500;
  opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:999;white-space:nowrap;
  color:var(--lbl);box-shadow:0 4px 24px rgba(0,0,0,.6);
  border:.5px solid var(--sep);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Bottom sheet ─────────────────────────────────────────── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:none;align-items:flex-end;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#modal-overlay.open{display:flex}
#modal-box{
  background:var(--bg2);border-radius:22px 22px 0 0;
  padding:0 0 max(28px,env(safe-area-inset-bottom));
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  animation:sheetUp .35s cubic-bezier(.32,1,.23,1);
  border-top:.5px solid var(--sep);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modal-box::before{
  content:'';display:block;width:36px;height:4px;
  background:var(--fill3);border-radius:2px;margin:10px auto 0;
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:.5px solid var(--sep);
}
.modal-title{font-size:17px;font-weight:600;letter-spacing:-.02em}
.modal-close{
  background:var(--fill);border:none;border-radius:50%;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;color:var(--lbl2);font-weight:500;
}

/* ── Spinner / loader ─────────────────────────────────────── */
.spinner{
  width:28px;height:28px;
  border:2px solid rgba(255,255,255,.08);border-top-color:var(--brand);
  border-radius:50%;animation:spin .8s linear infinite;
}

/* ── PIN pad ──────────────────────────────────────────────── */
.pin-display{display:flex;gap:18px;justify-content:center;margin:24px 0}
.pin-dot{
  width:12px;height:12px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);transition:all .12s;
}
.pin-dot.filled{background:var(--lbl);border-color:var(--lbl);transform:scale(1.1)}
.pin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;max-width:276px;margin:0 auto;padding:0 8px;
}
.pin-key{
  background:var(--bg3);border:none;border-radius:50%;
  width:72px;height:72px;margin:0 auto;
  font-size:24px;font-weight:300;cursor:pointer;
  transition:all .1s;font-family:'Inter',-apple-system,sans-serif;
  color:var(--lbl);display:flex;align-items:center;justify-content:center;
}
.pin-key:active{background:var(--bg4);transform:scale(.9)}
.pin-key.del{font-size:18px;color:var(--lbl2);font-weight:400}

/* ── Stats (grid) ─────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{
  background:var(--bg2);border-radius:var(--r-lg);
  padding:18px 14px;text-align:center;
}
.stat-val{
  font-size:32px;font-weight:800;color:var(--brand);
  line-height:1;letter-spacing:-.04em;
  font-variant-numeric:tabular-nums;
}
.stat-lbl{font-size:11px;color:var(--lbl3);margin-top:6px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}

/* ── iOS Toggle ───────────────────────────────────────────── */
.toggle{
  width:51px;height:31px;border-radius:16px;
  background:var(--bg4);position:relative;cursor:pointer;
  transition:background .28s;flex-shrink:0;
}
.toggle.on{background:var(--brand)}
.toggle-thumb{
  position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;
  background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);
  transition:left .28s cubic-bezier(.4,0,.2,1);
}
.toggle.on .toggle-thumb{left:22px}

/* ── Leaderboard ──────────────────────────────────────────── */
.lb-row{
  display:flex;align-items:center;gap:12px;padding:13px 0;
  border-bottom:.5px solid var(--sep);
}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:17px;font-weight:700;width:26px;text-align:center;font-variant-numeric:tabular-nums}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.lb-sub{font-size:12px;color:var(--lbl3);margin-top:1px}
.lb-score{font-size:17px;font-weight:700;color:var(--brand);font-variant-numeric:tabular-nums}

/* ── Goals ────────────────────────────────────────────────── */
.goal-row{background:var(--bg2);border-radius:var(--r-lg);padding:16px;margin-bottom:10px}
.goal-bar-bg{height:4px;background:var(--fill);border-radius:2px;margin-top:12px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:2px;background:var(--brand);transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* ── Feedback ─────────────────────────────────────────────── */
.fb-item{background:var(--bg2);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px}
.fb-stars{color:#ffd60a;font-size:13px;margin-bottom:5px}
.fb-text{font-size:15px;line-height:1.55;letter-spacing:-.01em}
.fb-meta{font-size:12px;color:var(--lbl3);margin-top:8px}

/* ── AI card ──────────────────────────────────────────────── */
.ai-card{
  background:linear-gradient(135deg,rgba(155,89,255,.1),rgba(0,229,160,.06));
  border:.5px solid rgba(155,89,255,.2);
  border-radius:var(--r-lg);padding:18px;
}
.ai-text{font-size:15px;line-height:1.7;color:rgba(255,255,255,.82);letter-spacing:-.01em}

/* ── Tap page ─────────────────────────────────────────────── */
.tap-page{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:32px 24px 60px;max-width:420px;margin:0 auto;position:relative;
}

/* ── Section label ────────────────────────────────────────── */
.sec-lbl{
  font-size:11px;font-weight:600;color:var(--lbl3);
  margin-bottom:12px;padding-left:2px;
  letter-spacing:.08em;text-transform:uppercase;
}

/* ── Animations ───────────────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.85)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
.fade-up{animation:fadeUp .35s cubic-bezier(.34,1.1,.64,1)}
.pop{animation:pop .3s cubic-bezier(.34,1.56,.64,1)}

/* ── Screen-specific: login ───────────────────────────────── */
.login-glow{
  position:absolute;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,.18) 0%,transparent 70%);
  pointer-events:none;
  top:-80px;left:50%;transform:translateX(-50%);
  filter:blur(40px);
}

/* ── Streak badge ─────────────────────────────────────────── */
.streak-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,107,53,.15);color:var(--a-orange);
  border-radius:100px;padding:4px 10px;font-size:12px;font-weight:600;
}

/* ── Achievement badge ────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg3);border-radius:var(--r-sm);
  padding:8px 12px;font-size:13px;font-weight:500;
}

/* ── Progress ring (SVG) ──────────────────────────────────── */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-label{position:absolute;text-align:center}

/* ── Podium ───────────────────────────────────────────────── */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-bar{border-radius:8px 8px 0 0;width:72px;background:var(--bg3)}
.podium-1 .podium-bar{height:80px;background:linear-gradient(180deg,rgba(0,229,160,.3),rgba(0,229,160,.12))}
.podium-2 .podium-bar{height:56px;background:linear-gradient(180deg,rgba(255,214,10,.25),rgba(255,214,10,.08))}
.podium-3 .podium-bar{height:40px;background:linear-gradient(180deg,rgba(255,107,53,.2),rgba(255,107,53,.06))}
</style>
